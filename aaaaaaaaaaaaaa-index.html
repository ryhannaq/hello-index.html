<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cloud Pong</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      background:linear-gradient(to bottom,#f7a8cc,#d5b7ff);
    }

    h1{
      margin-bottom:15px;
      color:white;
      font-size:70px;
      font-weight:900;

      -webkit-text-stroke:5px #2e6cff;

      text-shadow:
      0 0 10px rgba(255,255,255,0.6);
    }

    .menu{
      margin-bottom:20px;
      text-align:center;
    }

    button{
      padding:15px 30px;
      margin:10px;

      border:none;
      border-radius:16px;

      font-size:24px;
      font-weight:bold;

      cursor:pointer;

      transition:0.2s;

      color:white;

      border:4px solid white;
    }

    .single{
      background:#ff77bd;
    }

    .multi{
      background:#3b82f6;
    }

    button:hover{
      transform:scale(1.05);
    }

    .controls{
      margin-top:10px;
      color:#245cff;
      font-size:24px;
      font-weight:bold;
    }

    canvas{
      border:5px solid #4b7dff;
      border-radius:30px;

      background:linear-gradient(to bottom,#f8b6d5,#d7bcff);

      box-shadow:
      0 0 30px rgba(255,255,255,0.4),
      0 0 40px rgba(76,124,255,0.4);
    }
  </style>
</head>

<body>

  <h1>☁ CLOUD PONG ☁</h1>

  <div class="menu">
    <button class="single" onclick="setMode('single')">
      SINGLEPLAYER
    </button>

    <button class="multi" onclick="setMode('multi')">
      MULTIPLAYER
    </button>

    <div class="controls">
      JOGADOR 1: W / S
      &nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;
      JOGADOR 2: ↑ / ↓
    </div>
  </div>

  <canvas id="gameCanvas" width="1400" height="720"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameMode = "single";

function setMode(mode){
  gameMode = mode;
}

const player1 = {
  x:80,
  y:280,
  width:40,
  height:150,
  speed:8,
  score:0
};

const player2 = {
  x:1280,
  y:280,
  width:40,
  height:150,
  speed:8,
  score:0
};

const ball = {
  x:700,
  y:360,
  radius:18,
  speedX:6,
  speedY:5
};

const keys = {};

document.addEventListener("keydown",(e)=>{
  keys[e.key]=true;
});

document.addEventListener("keyup",(e)=>{
  keys[e.key]=false;
});

function drawCloud(x,y){

  ctx.fillStyle="white";
  ctx.strokeStyle="#2e6cff";
  ctx.lineWidth=6;

  ctx.shadowColor="rgba(46,108,255,0.4)";
  ctx.shadowBlur=15;

  ctx.beginPath();

  ctx.arc(x+10,y+40,28,0,Math.PI*2);
  ctx.arc(x+25,y+15,30,0,Math.PI*2);
  ctx.arc(x+50,y+40,30,0,Math.PI*2);
  ctx.arc(x+30,y+70,35,0,Math.PI*2);

  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawBall(){

  ctx.beginPath();

  ctx.fillStyle="white";
  ctx.strokeStyle="#2e6cff";
  ctx.lineWidth=5;

  ctx.shadowColor="rgba(255,255,255,0.8)";
  ctx.shadowBlur=15;

  ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);

  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur=0;
}

function drawCenterLine(){

  ctx.strokeStyle="rgba(255,255,255,0.8)";
  ctx.lineWidth=6;

  ctx.setLineDash([20,20]);

  ctx.beginPath();

  ctx.moveTo(canvas.width/2,50);
  ctx.lineTo(canvas.width/2,canvas.height-50);

  ctx.stroke();

  ctx.setLineDash([]);
}

function drawScore(){

  ctx.fillStyle="white";

  ctx.strokeStyle="#2e6cff";
  ctx.lineWidth=5;

  ctx.font="bold 90px Arial";

  ctx.strokeText(player1.score,580,110);
  ctx.fillText(player1.score,580,110);

  ctx.strokeText(player2.score,760,110);
  ctx.fillText(player2.score,760,110);
}

function drawBackgroundClouds(){

  ctx.globalAlpha=0.35;

  drawMiniCloud(180,120);
  drawMiniCloud(1050,170);
  drawMiniCloud(950,500);
  drawMiniCloud(300,520);
  drawMiniCloud(500,640);

  ctx.globalAlpha=1;
}

function drawMiniCloud(x,y){

  ctx.fillStyle="white";

  ctx.beginPath();

  ctx.arc(x,y,25,0,Math.PI*2);
  ctx.arc(x+30,y-10,30,0,Math.PI*2);
  ctx.arc(x+60,y,25,0,Math.PI*2);

  ctx.fill();
}

function movePlayers(){

  if(keys["w"] && player1.y>0){
    player1.y -= player1.speed;
  }

  if(keys["s"] && player1.y<canvas.height-120){
    player1.y += player1.speed;
  }

  if(gameMode==="multi"){

    if(keys["ArrowUp"] && player2.y>0){
      player2.y -= player2.speed;
    }

    if(keys["ArrowDown"] && player2.y<canvas.height-120){
      player2.y += player2.speed;
    }

  }else{

    let center = player2.y + 60;

    if(center < ball.y-35){
      player2.y += 5;
    }

    if(center > ball.y+35){
      player2.y -= 5;
    }
  }
}

function moveBall(){

  ball.x += ball.speedX;
  ball.y += ball.speedY;

  if(ball.y < 15 || ball.y > canvas.height-15){
    ball.speedY *= -1;
  }

  if(
    ball.x-ball.radius < player1.x+80 &&
    ball.y > player1.y &&
    ball.y < player1.y+120
  ){
    ball.speedX *= -1;
  }

  if(
    ball.x+ball.radius > player2.x &&
    ball.y > player2.y &&
    ball.y < player2.y+120
  ){
    ball.speedX *= -1;
  }

  if(ball.x < 0){
    player2.score++;
    resetBall();
  }

  if(ball.x > canvas.width){
    player1.score++;
    resetBall();
  }
}

function resetBall(){

  ball.x = canvas.width/2;
  ball.y = canvas.height/2;

  ball.speedX *= -1;

  ball.speedY = (Math.random()*6)-3;
}

function update(){

  movePlayers();
  moveBall();

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackgroundClouds();
  drawCenterLine();

  drawCloud(player1.x,player1.y);
  drawCloud(player2.x,player2.y);

  drawBall();
  drawScore();

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
